name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run integration tests
        run: npm run test:integration

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            coverage/
            test-results.xml
          retention-days: 7

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libxss1 libasound2t64 libgbm1 \
            xvfb x11-utils dbus-x11

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Package Electron app
        run: npm run package

      - name: Verify packaged app
        run: |
          echo "=== Build output ==="
          ls -laR out/ | head -40
          BINARY=$(find out/ -name 'zephyr-desktop' -type f ! -path '*/resource*' | head -1)
          echo "=== Binary: $BINARY ==="
          file "$BINARY"
          echo "=== Missing libraries ==="
          ldd "$BINARY" 2>&1 | grep -i "not found" || echo "All libraries found"
          echo "=== Smoke test: launch binary for 5s ==="
          dbus-run-session -- xvfb-run --auto-servernum timeout 5 \
            "$BINARY" --no-sandbox --disable-gpu --enable-logging --v=1 2>&1 | tail -40 || true

      - name: Run E2E tests
        env:
          NO_AT_BRIDGE: '1'
          ELECTRON_ENABLE_LOGGING: 'true'
        run: dbus-run-session -- xvfb-run --auto-servernum npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
