name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get package version
        id: pkg_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:unit

      - name: Install appdmg for DMG creation
        run: npm install --save-dev appdmg

      - name: Import macOS signing certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        uses: apple-actions/import-codesign-certs@v3
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build with Electron Forge
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run make

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-macOS-${{ steps.pkg_version.outputs.VERSION }}-dmg
          path: out/make/*.dmg
          if-no-files-found: warn

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-macOS-${{ steps.pkg_version.outputs.VERSION }}-zip
          path: out/make/zip/darwin/**/*.zip
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get package version
        id: pkg_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libxss1 libasound2t64 libgbm1 rpm fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:unit

      - name: Build with Electron Forge
        run: npm run make

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-Linux-${{ steps.pkg_version.outputs.VERSION }}-deb
          path: out/make/deb/**/*.deb
          if-no-files-found: warn

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-Linux-${{ steps.pkg_version.outputs.VERSION }}-rpm
          path: out/make/rpm/**/*.rpm
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get package version
        id: pkg_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:unit

      - name: Build with Electron Forge
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm run make

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-Windows-${{ steps.pkg_version.outputs.VERSION }}
          path: out/make/squirrel.windows/**/*
          if-no-files-found: warn

  publish:
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact structure
        run: ls -R artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Find and copy macOS DMG
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;

          # Find and copy macOS ZIP
          find artifacts -name "*.zip" -path "*/Zephyr-macOS-*" -exec cp {} release-assets/ \;

          # Find and copy Linux DEB
          find artifacts -name "*.deb" -exec cp {} release-assets/ \;

          # Find and copy Linux RPM
          find artifacts -name "*.rpm" -exec cp {} release-assets/ \;

          # Find and copy Windows installer
          find artifacts -path "*/Zephyr-Windows-*" -name "*.exe" -exec cp {} release-assets/ \;
          find artifacts -path "*/Zephyr-Windows-*" -name "RELEASES" -exec cp {} release-assets/ \;
          find artifacts -path "*/Zephyr-Windows-*" -name "*.nupkg" -exec cp {} release-assets/ \;

          echo "Release assets prepared:"
          ls -lh release-assets/

      - name: Determine pre-release status
        id: prerelease
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qE '(-alpha|-beta|-rc)'; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE_FLAG=""
          if [ "${{ steps.prerelease.outputs.IS_PRERELEASE }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "Zephyr Desktop $VERSION" \
            --generate-notes \
            $PRERELEASE_FLAG \
            release-assets/*
