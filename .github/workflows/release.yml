name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get package version
        id: pkg_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:unit

      - name: Install appdmg for DMG creation
        run: npm install --save-dev appdmg

      - name: Import macOS signing certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        uses: apple-actions/import-codesign-certs@v3
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build arm64
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-forge make --arch=arm64

      - name: Save arm64 outputs
        run: mv out/make out/make-arm64

      - name: Build x64
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-forge make --arch=x64

      - name: Upload arm64 DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-macOS-arm64-${{ steps.pkg_version.outputs.VERSION }}-dmg
          path: out/make-arm64/*.dmg
          if-no-files-found: warn

      - name: Upload arm64 ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-macOS-arm64-${{ steps.pkg_version.outputs.VERSION }}-zip
          path: out/make-arm64/zip/darwin/**/*.zip
          if-no-files-found: warn

      - name: Upload x64 DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-macOS-x64-${{ steps.pkg_version.outputs.VERSION }}-dmg
          path: out/make/*.dmg
          if-no-files-found: warn

      - name: Upload x64 ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-macOS-x64-${{ steps.pkg_version.outputs.VERSION }}-zip
          path: out/make/zip/darwin/**/*.zip
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get package version
        id: pkg_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libxss1 libasound2t64 libgbm1 rpm fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:unit

      - name: Build with Electron Forge
        run: npm run make

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-Linux-${{ steps.pkg_version.outputs.VERSION }}-deb
          path: out/make/deb/**/*.deb
          if-no-files-found: warn

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-Linux-${{ steps.pkg_version.outputs.VERSION }}-rpm
          path: out/make/rpm/**/*.rpm
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get package version
        id: pkg_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:unit

      - name: Build with Electron Forge
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm run make

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr-Windows-${{ steps.pkg_version.outputs.VERSION }}
          path: out/make/squirrel.windows/**/*
          if-no-files-found: warn

  publish:
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact structure
        run: ls -R artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Find and copy macOS DMG
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;

          # Find and copy macOS ZIP
          find artifacts -name "*.zip" -path "*/Zephyr-macOS-*" -exec cp {} release-assets/ \;

          # Find and copy Linux DEB
          find artifacts -name "*.deb" -exec cp {} release-assets/ \;

          # Find and copy Linux RPM
          find artifacts -name "*.rpm" -exec cp {} release-assets/ \;

          # Find and copy Windows installer
          find artifacts -path "*/Zephyr-Windows-*" -name "*.exe" -exec cp {} release-assets/ \;
          find artifacts -path "*/Zephyr-Windows-*" -name "RELEASES" -exec cp {} release-assets/ \;
          find artifacts -path "*/Zephyr-Windows-*" -name "*.nupkg" -exec cp {} release-assets/ \;

          # Rename files: replace spaces with hyphens so electron-updater's
          # space→hyphen path transformer produces URLs that match the actual filenames
          for f in release-assets/*; do
            newf="${f// /-}"
            [ "$f" != "$newf" ] && mv "$f" "$newf"
          done

          echo "Release assets prepared:"
          ls -lh release-assets/

      - name: Generate electron-updater metadata
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          python3 - <<'PYEOF'
          import os, hashlib, base64
          from datetime import datetime, timezone

          version = os.environ['VERSION']
          date = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%S.000Z')
          assets = 'release-assets'

          def sha512_b64(path):
              h = hashlib.sha512()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''):
                      h.update(chunk)
              return base64.b64encode(h.digest()).decode()

          def write_yaml(out_path, version, files, main_file, main_sha, date):
              lines = [f"version: {version}", "files:"]
              for entry in files:
                  lines += [
                      f"  - url: {entry['url']}",
                      f"    sha512: {entry['sha512']}",
                      f"    size: {entry['size']}",
                  ]
              lines += [
                  f"path: {main_file}",
                  f"sha512: {main_sha}",
                  f"releaseDate: '{date}'",
              ]
              with open(out_path, 'w') as f:
                  f.write('\n'.join(lines) + '\n')
              print(f"Generated {out_path}")

          # latest-linux.yml (DEB + RPM — include both so electron-updater can
          # pick the right format regardless of how the app was installed)
          linux_files = []
          main_deb = None
          for f in sorted(os.listdir(assets)):
              if f.endswith('.deb') or f.endswith('.rpm'):
                  p = os.path.join(assets, f)
                  sha = sha512_b64(p)
                  linux_files.append({'url': f, 'sha512': sha, 'size': os.path.getsize(p)})
                  if f.endswith('.deb') and main_deb is None:
                      main_deb = (f, sha)
          if linux_files:
              # Use the DEB as the primary path (fallback for legacy electron-updater)
              main_file, main_sha = main_deb if main_deb else (linux_files[0]['url'], linux_files[0]['sha512'])
              write_yaml(
                  os.path.join(assets, 'latest-linux.yml'), version,
                  linux_files, main_file, main_sha, date
              )

          # latest-mac.yml (ZIP — include both arm64 and x64 so electron-updater
          # picks the right arch; arm64 is listed first as the primary path fallback)
          mac_files = []
          main_arm64 = None
          for f in sorted(os.listdir(assets)):
              if f.endswith('.zip'):
                  p = os.path.join(assets, f)
                  sha = sha512_b64(p)
                  mac_files.append({'url': f, 'sha512': sha, 'size': os.path.getsize(p)})
                  if 'arm64' in f and main_arm64 is None:
                      main_arm64 = (f, sha)
          if mac_files:
              # Prefer arm64 as the primary path (fallback for legacy electron-updater)
              main_file, main_sha = main_arm64 if main_arm64 else (mac_files[0]['url'], mac_files[0]['sha512'])
              write_yaml(
                  os.path.join(assets, 'latest-mac.yml'), version,
                  mac_files, main_file, main_sha, date
              )

          # latest.yml (Windows EXE)
          exes = [f for f in os.listdir(assets) if f.endswith('.exe')]
          if exes:
              p = os.path.join(assets, exes[0])
              sha = sha512_b64(p)
              write_yaml(
                  os.path.join(assets, 'latest.yml'), version,
                  [{'url': exes[0], 'sha512': sha, 'size': os.path.getsize(p)}],
                  exes[0], sha, date
              )
          PYEOF

      - name: Determine pre-release status
        id: prerelease
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qE '(-alpha|-beta|-rc)'; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE_FLAG=""
          if [ "${{ steps.prerelease.outputs.IS_PRERELEASE }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "Zephyr Desktop $VERSION" \
            --generate-notes \
            $PRERELEASE_FLAG \
            release-assets/*
